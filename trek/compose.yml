services:                                                                                                                                                                                                    
  app:                                                                                                                                                                                                       
    image: mauriceboe/trek:latest                                                                                                                                                                            
    container_name: trek                                                                                                                                                                                     
    read_only: true                                                                                                                                                                                          
    security_opt:                                                                                                                                                                                            
      - no-new-privileges:true                                                                                                                                                                               
    cap_drop:                                                                                                                                                                                                
      - ALL                                                                                                                                                                                                  
    cap_add:                                                                                                                                                                                                 
      - CHOWN                                                                                                                                                                                                
      - SETUID                                                                                                                                                                                               
      - SETGID                                                                                                                                                                                               
    tmpfs:                                                                                                                                                                                                   
      - /tmp:noexec,nosuid,size=64m                                                                                                                                                                          
    ports:                                                                                                                                                                                                   
      - "127.0.0.1:3000:3000"                                                                                                                                                                                
    environment:                                                                                                                                                                                             
      - NODE_ENV=${NODE_ENV}                                                                                                                                                                                  
      - PORT=${PORT}                                                                                                                                                                                            
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-}                                                                                                                                                                   
      - FORCE_HTTPS=${FORCE_HTTPS}                                                                                                                                                                                     
      - APP_URL=${APP_URL}                                                                                                                                                                 
      - TRUST_PROXY=${TRUST_PROXY}                                                                                                                                                                                        
      - ADMIN_EMAIL=${ADMIN_EMAIL}                                                                                                                                                                     
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}                                                                                                                                     
    volumes:                                                                                                                                                                                                 
      - /var/docker/trek/data:/app/data                                                                                                                                                                      
      - /var/docker/trek/uploads:/app/uploads                                                                                                                                                                
    restart: unless-stopped                                                                                                                                                                                  
    healthcheck:                                                                                                                                                                                             
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]                                                                                                                                      
      interval: 30s                                                                                                                                                                                          
      timeout: 10s                                                                                                                                                                                           
      retries: 3                                                                                                                                                                                             
      start_period: 15s 
